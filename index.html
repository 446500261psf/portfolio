<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Product design portfolio — growth, conversion, engagement, and adoption."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Devanagari:wght@100;200;300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=La+Belle+Aurore&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <!-- Preload the hero strips so fetch starts in parallel with JS download,
         not after React mounts. Everything below the cover decodes in the
         background thanks to `decoding="async"` and `content-visibility: auto`. -->
    <link rel="preload" as="image" href="/figma/exports/cover.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/figma/exports/projects.png" fetchpriority="high" />
    <title>Sifan Pan — Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
